name: Atualizar Radar de Lançamentos

# Roda sozinho na nuvem do GitHub — não depende do seu computador.
on:
  schedule:
    # 09:00 UTC = 06:00 no horário de Brasília. Todo dia.
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  gerar-e-publicar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gerar a página (busca as novidades)
        run: python gerar_radar.py

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Empacotar a página
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
